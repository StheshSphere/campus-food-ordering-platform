<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management</title>
    <link rel="stylesheet" href="../src/css/menu-management.css">
</head>
<body>
    <div class="top-bar">
        <div>
            <h1>Menu Management</h1>
            <p>Manage your food items here.</p>
        </div>
        <button id="logout-btn">Logout</button>
    </div>

    <p id="message"></p>

    <section class="form-section">
        <h2 id="form-title">Add Menu Item</h2>

        <form id="menu-form">
            <input type="hidden" id="item-id">

            <label for="name">Item Name</label>
            <input type="text" id="name" placeholder="e.g. Chicken Burger" required>

            <label for="description">Description</label>
            <textarea id="description" placeholder="Enter item description"></textarea>

            <label for="price">Price</label>
            <input type="number" id="price" placeholder="e.g. 45.00" min="0" step="0.01" required>

            <label for="photo-url">Photo URL</label>
            <input type="text" id="photo-url" placeholder="Optional image URL">

            <label for="is-available">Available</label>
            <select id="is-available" required>
                <option value="true">Available</option>
                <option value="false">Sold Out</option>
            </select>

            <div class="form-buttons">
                <button type="submit" id="save-btn">Save Item</button>
                <button type="button" id="cancel-edit-btn" hidden>Cancel Edit</button>
            </div>
        </form>
    </section>

    <section class="list-section">
        <h2>Your Menu Items</h2>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Photo</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="menu-table-body">
                <tr>
                    <td colspan="6">Loading menu items...</td>
                </tr>
            </tbody>
        </table>
    </section>

    <script type="module" src="../src/js/menu/menu-management.js"></script>
</body>
</html>
