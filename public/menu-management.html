<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Menu Management</title>
    <link rel="stylesheet" href="../src/css/menu-management.css">
</head>

<body>
    <main class="container">
        <div class="top-bar">
            <div>
                <h1>Vendor Menu Management</h1>
                <p class="subtitle">Add and manage your food items here.</p>
            </div>
            <button id="logout-btn" class="logout-btn">Logout</button>
        </div>

        <p id="message" class="message"></p>

        <section class="form-section">
            <h2 id="form-title">Add Menu Item</h2>

            <form id="menu-item-form">
                <input type="hidden" id="editing-item-id">

                <fieldset class="form-group">
                    <label for="item-name">Item Name</label>
                    <input type="text" id="item-name" placeholder="Enter item name" required>
                </fieldset>

                <fieldset class="form-group">
                    <label for="item-description">Description</label>
                    <textarea id="item-description" placeholder="Enter item description" required></textarea>
                </fieldset>

                <fieldset class="form-group">
                    <label for="item-price">Price (R)</label>
                    <input type="number" id="item-price" placeholder="Enter price" min="0" step="0.01" required>
                </fieldset>

                <fieldset class="form-group">
                    <label for="item-image-url">Image URL</label>
                    <input type="text" id="item-image-url" placeholder="Enter image URL">
                </fieldset>

                <fieldset class="form-group">
                    <label for="item-availability">Availability</label>
                    <select id="item-availability">
                        <option value="true">Available</option>
                        <option value="false">Sold Out</option>
                    </select>
                </fieldset>

                <div class="button-row">
                    <button type="submit" id="submit-btn">Add Item</button>
                    <button type="button" id="cancel-edit-btn" class="secondary-btn" hidden>Cancel</button>
                </div>
            </form>
        </section>

        <section class="menu-items-section">
            <h2>Your Menu Items</h2>
            <div id="menu-items-container">
                <p>Your added menu items will appear here.</p>
            </div>
        </section>
    </main>

    <script type="module" src="../src/js/menu/menu-management.js"></script>
</body>

</html>
