<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Register</title>
    <link rel="stylesheet" href="../src/css/vendor-signup.css">
</head>
<body>
    <h2>Vendor Register</h2>

    <form id="signup-form">
        <input type="email" id="email" placeholder="Enter email" required>
        <br><br>

        <input type="password" id="password" placeholder="Enter password" required>
        <br><br>

        <input type="text" id="business-name" placeholder="Enter business name" required>
        <br><br>

        <button type="submit">Register</button>
    </form>

    <p id="message"></p>

    <p>
        Already have an account?
        <a href="vendor-login.html">Login here</a>
    </p>

    <script type="module" src="../src/js/auth/vendor-signup.js"></script>
</body>
</html>
